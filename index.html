<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NangorBase - Jatinangor Directory</title>
    <meta name="description" content="Direktori lengkap.">

    <!-- Fonts: Sora (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap"
        as="style">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Lenis for smooth scrolling -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</head>

<body>
    <!-- Hero -->
    <header class="hero">
        <div class="top-bar">
            <div class="glass-pill">
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode" onclick="toggleTheme()">
                    <i data-lucide="moon" class="icon-sm" id="theme-icon"></i>
                </button>
                <span class="lang-divider">|</span>
                <i data-lucide="globe" class="icon-sm" id="icon-lang"
                    style="color: rgba(255,255,255,0.8); margin-left: 4px;"></i>
                <button id="lang-id" class="lang-btn active" onclick="setLanguage('id')">ID</button>
                <span class="lang-divider">·</span>
                <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
            </div>
        </div>
        <div class="hero-inner">
            <h1 class="hero-title">
                <img src="img/logo.svg" class="hero-logo" alt="NangorBase">
            </h1>
            <p class="hero-tagline" data-i18n="hero_tagline">Apapun yang kamu butuhkan di Jatinangor, dari mahasiswa,
                untuk mahasiswa.</p>
            <p class="hero-subtitle" data-i18n="hero_subtitle">Panduan tempat-tempat penting di sekitar kampus
                ITB Jatinangor dan Unpad.</p>

            <div class="hero-stats" id="hero-stats">
                <div class="hero-stat">
                    <span class="hero-stat-value" id="hero-listing-count">—</span>
                    <span class="hero-stat-label" data-i18n="hero_stat_listings">Lokasi</span>
                </div>
                <div class="hero-stat-divider"></div>
                <div class="hero-stat">
                    <span class="hero-stat-value" id="hero-category-count">—</span>
                    <span class="hero-stat-label" data-i18n="hero_stat_categories">Kategori</span>
                </div>
                <div class="hero-stat-divider"></div>
                <div class="hero-stat">
                    <span class="hero-stat-value" id="hero-last-updated">—</span>
                    <span class="hero-stat-label" data-i18n="hero_stat_updated">Terakhir Diperbarui</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Search & Filter Bar -->
    <div id="filter-bar" class="filter-bar">
        <div class="filter-container">

            <!-- Search Row -->
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input"
                    placeholder="Cari tempat, layanan, atau alamat..." data-i18n-placeholder="search_placeholder"
                    autocomplete="off">
                <kbd class="search-kbd" id="search-kbd" aria-hidden="true">Ctrl + K</kbd>
            </div>

            <!-- Category Pills Row -->
            <div id="category-pills" class="category-pills">
                <!-- Pills rendered by JavaScript -->
            </div>

            <!-- Price & Clear Row -->
            <div class="filter-actions">
                <div id="price-filters" class="price-filters">
                    <!-- Price buttons rendered by JavaScript -->
                </div>
                <div class="settings-wrapper">
                    <label for="dropdown-trigger" class="settings-label">
                        <i data-lucide="settings-2" class="icon-sm"></i> <span data-i18n="show_label">Show:</span>
                    </label>
                    <div class="custom-dropdown" id="items-per-page-dropdown">
                        <button class="dropdown-trigger" id="dropdown-trigger" aria-haspopup="listbox"
                            aria-expanded="false">
                            <span id="dropdown-selected-value">12</span>
                            <i data-lucide="chevron-down" class="icon-xs dropdown-arrow"></i>
                        </button>
                        <div class="dropdown-menu" id="dropdown-menu" role="listbox">
                            <div class="dropdown-option active" data-value="12" role="option">12</div>
                            <div class="dropdown-option" data-value="24" role="option">24</div>
                            <div class="dropdown-option" data-value="36" role="option">36</div>
                            <div class="dropdown-option" data-value="all" role="option"><span
                                    data-i18n="show_all">All</span></div>
                        </div>
                    </div>
                </div>
                <button id="clear-filters" class="clear-filters-btn"><i data-lucide="x" class="icon-xs"></i> <span
                        data-i18n="clear_filters">Clear Filters</span></button>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/main.js"></script>

</body>

</html>
